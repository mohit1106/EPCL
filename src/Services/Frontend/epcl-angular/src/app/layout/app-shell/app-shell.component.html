<div class="app-shell" [class.collapsed]="isCollapsed">
  <!-- Sidebar -->
  <aside class="sidebar" *ngIf="isAuthenticated$ | async">
    <div class="sidebar-header">
      <div class="logo" *ngIf="!isCollapsed">
        <div class="logo-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg>
        </div>
        <div class="logo-text-group">
          <span class="logo-text">EPCL</span>
          <span class="logo-subtitle">Fuel Management</span>
        </div>
      </div>
      <div class="logo-collapsed" *ngIf="isCollapsed">
        <div class="logo-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"/></svg>
        </div>
      </div>
      <button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path *ngIf="!isCollapsed" stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
          <path *ngIf="isCollapsed" stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of filteredNavItems"
        class="nav-item"
        [routerLink]="item.route"
        [class.active]="isActive(item.route)"
        [title]="item.label"
      >
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon"/>
        </svg>
        <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="connection-status" [class]="(connectionStatus$ | async) || 'disconnected'">
        <span class="status-dot"></span>
        <span class="status-label" *ngIf="!isCollapsed">
          {{ (connectionStatus$ | async) === 'connected' ? 'Live' : (connectionStatus$ | async) === 'reconnecting' ? 'Reconnecting...' : 'Offline' }}
        </span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Topbar -->
    <header class="topbar" *ngIf="isAuthenticated$ | async">
      <div class="topbar-left">
        <button class="mobile-menu-toggle" (click)="toggleSidebar()" aria-label="Toggle menu">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="22" height="22"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>

      <div class="topbar-right">
        <!-- Notifications -->
        <button class="topbar-btn" title="Notifications">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        </button>

        <!-- User Menu -->
        <div class="user-menu" *ngIf="user$ | async as user">
          <div class="user-avatar" [routerLink]="'/profile/settings'" title="Profile Settings">
            <img *ngIf="user.profilePictureUrl" [src]="user.profilePictureUrl" [alt]="user.fullName" />
            <span *ngIf="!user.profilePictureUrl" class="avatar-initials">
              {{ user.fullName | slice:0:2 | uppercase }}
            </span>
          </div>
          <div class="user-info">
            <span class="user-name">{{ user.fullName }}</span>
            <span class="user-role">{{ user.role }}</span>
          </div>
          <button class="topbar-btn logout-btn" (click)="onLogout()" title="Sign Out">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content" [class.no-shell]="!(isAuthenticated$ | async)">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
