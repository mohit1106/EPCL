<!-- AI Chat FAB -->
<button
  class="ai-fab"
  (click)="toggle()"
  [class.active]="isOpen"
  id="ai-chat-fab"
  aria-label="Toggle AI Assistant"
>
  <svg *ngIf="!isOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
  <svg *ngIf="isOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
</button>

<!-- Chat Panel -->
<div class="ai-panel" [class.open]="isOpen">
  <!-- Panel Header -->
  <div class="ai-panel-header">
    <div class="ai-header-left">
      <div class="ai-logo">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      </div>
      <div>
        <h3>EPCL AI</h3>
        <span class="ai-status">Natural Language Analytics</span>
      </div>
    </div>
    <div class="ai-header-actions">
      <button class="ai-header-btn" (click)="clearHistory()" title="Clear Chat">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </button>
      <button class="ai-header-btn" (click)="close()" title="Close">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- Chat Body -->
  <div class="ai-panel-body" #chatBody>
    <!-- Welcome + Suggestions -->
    <div class="ai-welcome" *ngIf="messages.length === 0">
      <h4>Ask anything about your data</h4>
      <p>I can generate SQL queries, create charts, and provide insights from your fuel management data.</p>
      <div class="ai-suggestions">
        <button 
          class="suggestion-chip" 
          *ngFor="let s of suggestions" 
          (click)="useSuggestion(s)"
        >{{ s }}</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="ai-messages" *ngIf="messages.length > 0">
      <div 
        class="ai-msg" 
        *ngFor="let msg of messages; let i = index; trackBy: trackByIndex"
        [ngClass]="'msg-' + msg.role"
      >
        <!-- User avatar -->
        <div class="msg-avatar" *ngIf="msg.role === 'user'">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>

        <!-- AI avatar -->
        <div class="msg-avatar ai-avatar" *ngIf="msg.role === 'assistant'">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        </div>

        <div class="msg-body">
          <!-- Loading dots -->
          <div class="loading-dots" *ngIf="msg.isLoading">
            <span></span><span></span><span></span>
          </div>

          <!-- Content -->
          <div class="msg-content" *ngIf="!msg.isLoading">{{ msg.content }}</div>

          <!-- Table data -->
          <div class="msg-table-wrap" *ngIf="msg.tableData && msg.tableData.length > 0 && !msg.isLoading">
            <button class="toggle-table-btn" (click)="toggleTable(i)">
              {{ showTable[i] ? 'Hide' : 'Show' }} Table ({{ msg.rowsReturned }} rows)
            </button>
            <div class="msg-table" *ngIf="showTable[i]">
              <table>
                <thead>
                  <tr>
                    <th *ngFor="let col of msg.columnNames">{{ col }}</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let row of msg.tableData">
                    <td *ngFor="let col of msg.columnNames">{{ row[col] }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Actions -->
          <div class="msg-actions" *ngIf="msg.role === 'assistant' && !msg.isLoading">
            <button class="msg-action-btn" (click)="copyResponse(msg.content)" title="Copy">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75" width="12" height="12"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="ai-panel-input">
    <textarea
      #messageInput
      class="ai-input"
      [(ngModel)]="inputText"
      (keydown)="onKeyDown($event)"
      placeholder="Ask about your data..."
      rows="1"
    ></textarea>
    <button class="ai-send" (click)="sendMessage()" [disabled]="isLoading || !inputText.trim()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
    </button>
  </div>
</div>
