<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Daily Sales Summary</title></head>
<body style="margin:0;padding:0;background-color:#0F172A;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0F172A;padding:40px 20px;">
  <tr><td align="center">
    <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
      <tr><td style="background:linear-gradient(135deg,#1B3A6B 0%,#2563EB 100%);padding:30px 40px;border-radius:16px 16px 0 0;text-align:center;">
        <span style="font-size:36px;font-weight:900;color:#FFF;letter-spacing:-1px;">EPCL</span>
        <div style="font-size:11px;color:#93C5FD;letter-spacing:3px;text-transform:uppercase;margin-top:4px;">Eleven Petroleum Corporation Limited</div>
      </td></tr>
      <tr><td style="background:#FFFFFF;padding:40px;">
        <h1 style="margin:0 0 8px;font-size:22px;color:#0F172A;">Daily Sales Summary</h1>
        <p style="margin:0 0 24px;font-size:14px;color:#64748B;">{{ReportDate}} — {{StationName}}</p>
        <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
          <tr>
            <td style="background:#F0F7FF;border-radius:8px;padding:20px;text-align:center;width:33%;">
              <div style="font-size:24px;font-weight:900;color:#1B3A6B;">{{TotalLitres}}</div>
              <div style="font-size:12px;color:#64748B;margin-top:4px;">Litres Sold</div>
            </td>
            <td style="width:8px;"></td>
            <td style="background:#F0FDF4;border-radius:8px;padding:20px;text-align:center;width:33%;">
              <div style="font-size:24px;font-weight:900;color:#059669;">₹{{TotalRevenue}}</div>
              <div style="font-size:12px;color:#64748B;margin-top:4px;">Revenue</div>
            </td>
            <td style="width:8px;"></td>
            <td style="background:#FFF7ED;border-radius:8px;padding:20px;text-align:center;width:33%;">
              <div style="font-size:24px;font-weight:900;color:#EA580C;">{{TransactionCount}}</div>
              <div style="font-size:12px;color:#64748B;margin-top:4px;">Transactions</div>
            </td>
          </tr>
        </table>
        <div style="margin-bottom:24px;">{{FuelBreakdownHtml}}</div>
        <div style="text-align:center;">
          <a href="{{ReportUrl}}" style="display:inline-block;background:#2563EB;color:#FFF;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;">View Full Report</a>
        </div>
      </td></tr>
      <tr><td style="padding:24px 0;text-align:center;"><p style="margin:0;font-size:12px;color:#475569;">© 2025 Eleven Petroleum Corporation Limited.</p></td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
