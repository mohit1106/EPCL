<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Fraud Alert</title></head>
<body style="margin:0;padding:0;background-color:#0F172A;font-family:'Helvetica Neue',Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0F172A;padding:40px 20px;">
  <tr><td align="center">
    <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
      <tr><td style="background:linear-gradient(135deg,#1B3A6B 0%,#2563EB 100%);padding:30px 40px;border-radius:16px 16px 0 0;text-align:center;">
        <span style="font-size:36px;font-weight:900;color:#FFF;letter-spacing:-1px;">EPCL</span>
        <div style="font-size:11px;color:#93C5FD;letter-spacing:3px;text-transform:uppercase;margin-top:4px;">Eleven Petroleum Corporation Limited</div>
      </td></tr>
      <tr><td style="background:#FFFFFF;padding:0;">
        <div style="background:linear-gradient(135deg,#DC2626,#EA580C);padding:16px 40px;text-align:center;">
          <span style="font-size:18px;font-weight:700;color:#FFF;">🚨 Fraud Alert Detected</span>
        </div>
        <div style="padding:40px;">
          <div style="display:inline-block;background:{{SeverityColor}};color:#FFF;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:16px;">{{Severity}}</div>
          <h1 style="margin:8px 0;font-size:22px;color:#0F172A;">{{RuleName}}</h1>
          <p style="margin:0 0 24px;font-size:15px;color:#64748B;line-height:1.6;">{{Description}}</p>
          <table width="100%" cellpadding="8" cellspacing="0" style="border:1px solid #E2E8F0;border-radius:8px;margin-bottom:24px;">
            <tr style="background:#F8FAFC;"><td style="font-size:13px;color:#64748B;">Alert ID</td><td style="font-size:14px;color:#0F172A;font-weight:600;">{{AlertId}}</td></tr>
            <tr><td style="font-size:13px;color:#64748B;">Station</td><td style="font-size:14px;color:#0F172A;">{{StationId}}</td></tr>
            <tr style="background:#F8FAFC;"><td style="font-size:13px;color:#64748B;">Transaction</td><td style="font-size:14px;color:#0F172A;">{{TransactionId}}</td></tr>
            <tr><td style="font-size:13px;color:#64748B;">Timestamp</td><td style="font-size:14px;color:#0F172A;">{{Timestamp}}</td></tr>
          </table>
          <div style="text-align:center;">
            <a href="{{ReviewUrl}}" style="display:inline-block;background:#DC2626;color:#FFF;padding:14px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px;">Review Alert</a>
          </div>
        </div>
      </td></tr>
      <tr><td style="padding:24px 0;text-align:center;">
        <p style="margin:0;font-size:12px;color:#475569;">© 2025 Eleven Petroleum Corporation Limited.</p>
      </td></tr>
    </table>
  </td></tr>
</table>
</body>
</html>
